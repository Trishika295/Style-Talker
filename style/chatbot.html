<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Style Talk - Chat</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .chat-container {
      display: flex;
      height: 100vh;
    }

    .chat-sidebar {
      width: 250px;
      background: #f8f8f8;
      padding: 20px;
      border-right: 1px solid #ddd;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .chat-header {
      background: #f0f0f0;
      padding: 15px;
      border-bottom: 1px solid #ddd;
      margin: -40px -40px 20px -40px;
      padding: 15px 40px;
    }

    .chat-header h2 {
      margin: 0;
      font-size: 18px;
      color: #333;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 10px;
      color: #ff69b4;
      text-decoration: none;
      font-size: 14px;
      cursor: pointer;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .chat-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 40px;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    .chat-window {
      display: flex;
      flex-direction: column;
      height: 100%;
      gap: 20px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      padding: 12px 16px;
      border-radius: 8px;
      max-width: 70%;
      word-wrap: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: #ff69b4;
      color: white;
    }

    .message.bot {
      align-self: flex-start;
      background: #f0f0f0;
      color: #333;
    }

    .input-area {
      display: flex;
      gap: 10px;
    }

    .input-area input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }

    .input-area button {
      padding: 12px 24px;
      background: #ff69b4;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    .input-area button:hover {
      background: #ff46a0;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <!-- Sidebar -->
    <aside class="chat-sidebar">
      <div>
        <div class="user-info">
          <p>User ID: <span id="userId">...loading</span></p>
          <p class="note">Running Locally (No Backend Required)</p>
        </div>
        <nav class="nav">
          <a href="index.html" class="nav-btn" style="display: block; text-align: center; text-decoration: none; color: #333;">← Back to Categories</a>
          <button class="nav-btn">History</button>
          <button class="nav-btn">Projects</button>
        </nav>
        <div class="recent-chats">
          <h4>RECENT CHATS</h4>
          <p>No recent chats. Start one now!</p>
        </div>
      </div>
      <button class="signout-btn" onclick="signOut()">Sign Out</button>
    </aside>

    <!-- Main Chat Content -->
    <main class="chat-content">
      <div class="chat-header">
        <a href="index.html" class="back-link">← Back to Categories</a>
        <h2>Chat - <span id="categoryTitle">Loading...</span></h2>
      </div>

      <!-- Chat Window -->
      <div class="chat-window">
        <div id="chatMessages" class="messages"></div>
        <div class="input-area">
          <input type="text" id="userInput" placeholder="Ask about outfits, colors, etc...">
          <button onclick="sendMessage()">Send</button>
        </div>
      </div>
    </main>
  </div>

  <script src="js/auth.js"></script>
  <script>

    checkAuth();
    
    document.addEventListener('DOMContentLoaded', function() {
      const user = localStorage.getItem("user");
      if (user) {
        const userData = JSON.parse(user);
        document.getElementById("userId").textContent = userData.email || userData.name || "User";
      }
    });
  </script>
  <script src="js/fashionAPI.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const params = new URLSearchParams(window.location.search);
      const category = params.get('category') || 'general';
      initializeChatbot(category);
    });

    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('userInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          sendMessage();
        }
      });
    });
  </script>
</body>
</html>
