<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Style Talk - Sign In</title>
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1 class="auth-title">Style Talk</h1>
      <p class="auth-subtitle">Your Personal AI Style Companion</p>
      <p class="auth-tagline">for Real-Time Trends</p>

      <form id="loginForm" onsubmit="handleLogin(event)" class="auth-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn btn-primary">Sign In</button>
      </form>

      <div class="auth-divider">Don't have an account?</div>

      <button class="btn btn-secondary" onclick="window.location.href='register.html'">Create Account</button>

      <p class="auth-footer">Start your style journey to save chats and get personalized advice.</p>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>

  checkAuth();
    
    function handleLogin(event) {
      event.preventDefault();
      signIn();
    }
  </script>
</body>
</html>
